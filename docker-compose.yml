services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Di-inline saat build (NEXT_PUBLIC_*). Ubah bila API berpindah.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://psait-x-pad.onrender.com}
    image: psait-web
    container_name: psait-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
